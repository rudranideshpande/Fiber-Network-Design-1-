<!DOCTYPE html>
<html>
<head>
    <title>Fiber Network Design</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🌐 Fiber Network Design (Kruskal MST)</h1>

<div class="card">
    <label>Number of Vertices:</label>
    <input type="number" id="n" value="4">

    <label>Edges (JSON format):</label>
    <textarea id="edges">
[[0,1,10],[0,2,6],[0,3,5],[1,3,15],[2,3,4]]
    </textarea>

    <button onclick="runAlgo()">Run Algorithm</button>
</div>

<h2>Output:</h2>
<pre id="output"></pre>

<script>
async function runAlgo() {
    try {
        let n = document.getElementById("n").value;
        let edges = JSON.parse(document.getElementById("edges").value);

        let res = await fetch('/run', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                n: parseInt(n),
                edges: edges
            })
        });

        let text = await res.text();

        try {
            let data = JSON.parse(text);
            document.getElementById("output").innerText = data.output;
        } catch {
            document.getElementById("output").innerText = text;
        }

    } catch (err) {
        document.getElementById("output").innerText = "Error: " + err;
    }
}
</script>

</body>
</html>
