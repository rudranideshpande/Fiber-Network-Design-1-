<!DOCTYPE html>
<html>
<head>
    <title>Fiber Network Design</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 650px;
        }

        h1 {
            text-align: center;
        }

        h3 {
            margin-top: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #e5e7eb;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .output {
            margin-top: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Fiber Network Design</h1>

    <!-- Locations -->
    <h3>Locations</h3>
    <div class="grid">
        <input id="loc1" placeholder="Hospital" oninput="updateDropdowns()">
        <input id="loc2" placeholder="School" oninput="updateDropdowns()">
        <input id="loc3" placeholder="Mall" oninput="updateDropdowns()">
        <input id="loc4" placeholder="Office" oninput="updateDropdowns()">
    </div>

    <!-- Connections -->
    <h3>Connections</h3>

    <div class="row">
        <select id="f1"></select>
        <select id="t1"></select>
        <input placeholder="Cost" id="c1">
    </div>

    <div class="row">
        <select id="f2"></select>
        <select id="t2"></select>
        <input placeholder="Cost" id="c2">
    </div>

    <div class="row">
        <select id="f3"></select>
        <select id="t3"></select>
        <input placeholder="Cost" id="c3">
    </div>

    <div class="row">
        <select id="f4"></select>
        <select id="t4"></select>
        <input placeholder="Cost" id="c4">
    </div>

    <div class="row">
        <select id="f5"></select>
        <select id="t5"></select>
        <input placeholder="Cost" id="c5">
    </div>

    <button onclick="runAlgo()">🚀 Run Algorithm</button>

    <div class="output" id="output">
        Output will appear here...
    </div>
</div>

<script>

// Update dropdown options based on locations
function updateDropdowns() {
    let locations = [];

    for (let i = 1; i <= 4; i++) {
        let val = document.getElementById("loc" + i).value.trim();
        if (val) locations.push(val);
    }

    for (let i = 1; i <= 5; i++) {
        let from = document.getElementById("f" + i);
        let to = document.getElementById("t" + i);

        from.innerHTML = "";
        to.innerHTML = "";

        locations.forEach(loc => {
            let opt1 = new Option(loc, loc);
            let opt2 = new Option(loc, loc);
            from.add(opt1);
            to.add(opt2);
        });
    }
}

// Run algorithm
async function runAlgo() {
    let locations = [];

    for (let i = 1; i <= 4; i++) {
        let val = document.getElementById("loc" + i).value.trim();
        if (val) locations.push(val);
    }

    let edges = [];

    for (let i = 1; i <= 5; i++) {
        let u = document.getElementById("f" + i).value;
        let v = document.getElementById("t" + i).value;
        let w = parseInt(document.getElementById("c" + i).value);

        if (u && v && !isNaN(w)) {
            edges.push([u, v, w]);
        }
    }

    if (locations.length === 0 || edges.length === 0) {
        document.getElementById("output").innerText = "❌ Please enter valid data!";
        return;
    }

    let res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            n: locations.length,
            locations: locations,
            edges: edges
        })
    });

    let data = await res.json();

    document.getElementById("output").innerText = data.output;
}

// Initialize empty dropdowns
updateDropdowns();

</script>

</body>
</html>
