<!DOCTYPE html>
<html>
<head>
    <title>Smart City Fiber Network</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🌐 Fiber Network Design</h1>

<div class="card">
    <label>Vertices:</label>
    <input type="number" id="n" value="4">

    <label>Edges (JSON format):</label>
    <textarea id="edges">
[[0,1,10],[0,2,6],[0,3,5],[1,3,15],[2,3,4]]
    </textarea>

    <button onclick="run()">Run Algorithm</button>
</div>

<h2>Output</h2>
<pre id="output"></pre>

<script>
async function run() {
    let n = document.getElementById("n").value;
    let edges = JSON.parse(document.getElementById("edges").value);

    let res = await fetch('/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({n: parseInt(n), edges: edges})
    });

    let data = await res.json();
    document.getElementById("output").innerText = data.output;
}
</script>

</body>
</html>
