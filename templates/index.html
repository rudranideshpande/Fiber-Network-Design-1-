<!DOCTYPE html>
<html>
<head>
    <title>Fiber Network Design</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            width: 60%;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        table {
            width: 100%;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Fiber Network Design</h2>

    <h3>Locations</h3>
    <input placeholder="Hospital">
    <input placeholder="School">
    <input placeholder="Mall">
    <input placeholder="Office">

    <h3>Connections</h3>
    <table>
        <tr>
            <th>From</th>
            <th>To</th>
            <th>Cost</th>
        </tr>

        <tr>
            <td><input placeholder="Hospital"></td>
            <td><input placeholder="School"></td>
            <td><input placeholder="10"></td>
        </tr>

        <tr>
            <td><input placeholder="Hospital"></td>
            <td><input placeholder="Mall"></td>
            <td><input placeholder="6"></td>
        </tr>

    </table>

    <br>
    <button>Run Algorithm</button>
</div>

</body>
</html>
